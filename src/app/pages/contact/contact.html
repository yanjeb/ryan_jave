<section class="contact">

  <!-- TITLE -->
  <div class="contact-header">
    <h1>Contact Us</h1>
    <p>We’d love to hear from you</p>
  </div>

  <!-- CONTENT -->
  <div class="contact-container">

    <!-- LEFT: FORM -->
    <div class="contact-form">

      <h2>Send a Message</h2>

      <input type="text" placeholder="Full Name">
      <input type="email" placeholder="Email Address">
      <textarea placeholder="Your Message"></textarea>

      <button>Send Message</button>

    </div>

    <!-- RIGHT: INFO + MAP -->
    <div class="contact-info">

      <h2>Visit Us</h2>
      <p>Living Temple Foursquare Gospel Church</p>
      <p>Tagum City,Davao Del Norte, Philippines</p>

      <!-- GOOGLE MAP -->
      <div class="map-container">
        <iframe
          src="https://www.google.com/maps?q=Living Temple Foursquare Gospel Church&latlng=7.4413943,125.8034182&z=17&output=embed"
          width="100%"
          height="300"
          style="border:0;"
          loading="lazy">
        </iframe>
      </div>

    </div>

  </div>

</section>
